name: No-live CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  no-live-checks:
    name: No-live checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.19.0'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run public no-live validation suite
        run: pnpm run check

      - name: Build public static site
        run: pnpm --dir apps/web run build:public-site
